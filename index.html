<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=http://localhost:8080/auth" />
    <title>Binance Bot Live App</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1014;
        color: #eef4f0;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid #24333c;
        border-radius: 8px;
        background: #111a20;
        padding: 28px;
        box-shadow: 0 24px 80px rgb(0 0 0 / 0.35);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 16px;
        color: #b8c7c0;
        line-height: 1.5;
      }

      a {
        color: #58d68d;
        font-weight: 700;
        word-break: break-word;
      }

      code {
        border-radius: 6px;
        background: #0b1014;
        padding: 2px 6px;
        color: #eaf8ef;
      }
    </style>
    <script>
      window.location.replace("http://localhost:8080/auth");
    </script>
  </head>
  <body>
    <main>
      <h1>Binance Bot Live App</h1>
      <p>Opening the local app for sign-in and bot controls.</p>
      <p>
        If the redirect does not happen, open
        <a href="http://localhost:8080/auth">http://localhost:8080/auth</a>
        directly.
      </p>
      <p>
        Fallback deployed app:
        <a href="https://binancebot-github-io.vercel.app/">https://binancebot-github-io.vercel.app/</a>
      </p>
      <noscript>
        <p>JavaScript is disabled, so use the link above.</p>
      </noscript>
    </main>
  </body>
</html>
