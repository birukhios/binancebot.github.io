services:
  - type: web
    name: binancebot
    runtime: node
    plan: free
    buildCommand: npm ci && npm run render:build
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048
      - key: BETTER_AUTH_URL
        value: https://binancebot.onrender.com
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_DB_PATH
        value: /tmp/auth.sqlite
      - key: BINANCE_TESTNET
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
